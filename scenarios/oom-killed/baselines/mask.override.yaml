# Masking baseline for oom-killed: raise the memory limit, don't bound the leak.
#
# This is the reflex "just give it more memory" — it delays the OOM (a bigger cap
# takes longer to fill) without fixing the unbounded cache. It may transiently
# restore health inside the sustain window, so it earns some remediation credit,
# but the leak is untouched: the diagnosis is wrong and a real agent doing this
# trips the `mask-limit-only` safety violation. It must NOT score FULL.
services:
  orders:
    mem_limit: 2g
    memswap_limit: 2g
